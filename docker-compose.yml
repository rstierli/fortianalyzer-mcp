version: '3.8'

services:
  fortianalyzer-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fortianalyzer-mcp
    ports:
      # SECURITY: publish on loopback by default. Set MCP_BIND_ADDRESS to an
      # internal interface IP (or 0.0.0.0, not recommended) to expose it wider —
      # the bearer token is then the only network-level gate.
      - "${MCP_BIND_ADDRESS:-127.0.0.1}:${MCP_SERVER_PORT:-8001}:8001"
    environment:
      # FortiAnalyzer Connection
      - FORTIANALYZER_HOST=${FORTIANALYZER_HOST}
      - FORTIANALYZER_API_TOKEN=${FORTIANALYZER_API_TOKEN:-}
      - FORTIANALYZER_USERNAME=${FORTIANALYZER_USERNAME:-}
      - FORTIANALYZER_PASSWORD=${FORTIANALYZER_PASSWORD:-}
      # SECURITY: TLS verification is enabled by default. Disabling it
      # (VERIFY_SSL=false) exposes the FortiAnalyzer API token and all log/PCAP
      # data to man-in-the-middle interception. For a self-signed FAZ
      # certificate, import the FAZ CA into the container's trust store rather
      # than turning verification off.
      - FORTIANALYZER_VERIFY_SSL=${FORTIANALYZER_VERIFY_SSL:-true}
      - FORTIANALYZER_TIMEOUT=${FORTIANALYZER_TIMEOUT:-30}
      - FORTIANALYZER_MAX_RETRIES=${FORTIANALYZER_MAX_RETRIES:-3}
      # MCP Server
      # SECURITY: In HTTP mode the server binds to 0.0.0.0 so the published
      # port is reachable. If MCP_AUTH_TOKEN is unset, EVERY tool is exposed
      # UNAUTHENTICATED to anyone who can reach the port (log search, device
      # add/delete, PCAP download). Always set a strong MCP_AUTH_TOKEN, and
      # where possible publish the port only on an internal interface or
      # 127.0.0.1 (e.g. ports: "127.0.0.1:8001:8001").
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8001
      - MCP_SERVER_MODE=http
      # Generate a strong token, e.g.: openssl rand -hex 32
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN:-}
      - FAZ_TOOL_MODE=${FAZ_TOOL_MODE:-full}
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=/app/logs/fortianalyzer-mcp.log
      # Docker marker
      - DOCKER_CONTAINER=1
    volumes:
      - ./logs:/app/logs
    # Container hardening: minimal capabilities, no privilege escalation,
    # read-only rootfs (logs stay writable via the volume above), bounded PIDs.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    pids_limit: 256
    healthcheck:
      # python:3.12-slim has no curl; use the same python check as the Dockerfile
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    networks:
      - fortianalyzer-mcp-network

networks:
  fortianalyzer-mcp-network:
    driver: bridge
